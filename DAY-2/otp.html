<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myOtp</title>
    <style>
        body{
            background-color: lightgray;
            text-align: center;
        }

        span{
            color: blue;
            font-size: 34px;
        }
    </style>
</head>
<body>
    <h1>Your six digit Otp is <span></span> use it careFully</h1>
    <button>Generate otp</button>

    <script>
        let b1=document.querySelector('button')
        b1.addEventListener('click',()=>{
            console.log("hey Otp")
            let otp=''
            for(i=0; i<6; i++){
                otp+=Math.floor(Math.random()*10)
                document.querySelector('span').textContent=otp
            }
        })
    </script>
</body>
</html>
