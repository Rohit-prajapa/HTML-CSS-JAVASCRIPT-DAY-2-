<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Please see console</h1>

    <script>
        console.log("hello");

        for (let i = 1; i <= 10; i++) {
            console.log("hello world");
        }

        console.log("==========================")
    
    
        for(i=1; i<=10; i++){
            for(j=1; j<=10; j++){
                console.log(i +" * "+j +"= "+i*j)
            }
            console.log("-----------------")
        }

        let language=["html","css","java","Cpp"]
        console.log(language)
        console.log(language[0])
        language.push("c")
        console.log(language)
        language.unshift("python")
        console.log(language)
        language.pop()
        console.log(language)

        language[2]="Korlin"
        console.log(language)

        console.log(language.reverse())

    </script>
</body>
</html>
