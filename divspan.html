<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color: blue;
            height: 100px;
            width: 50%;
        }
        span{
            background-color: aqua;
            width: 100px;
            height: 100px;
        margin-left: 40px;
        }
        h1{
            background-color: red;
            margin-left: 30px;
            margin-top: 10px;
        }
        h3{
            background-color: yellow;
            padding-left: 30px;
            border: 3px solid red;
        }
        h3:hover{
            background-color: black;
            transition: 3s;
            font-size: 30px;
            
        }
    </style>
</head>
<body>
    <div>I am in div</div>
    <span>span Demo</span>
    <h1>I will show Margin</h1>
    <h3>I will show padding
    </h3>
</body>
</html>
